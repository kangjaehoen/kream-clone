<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <title>KREAM | 한정판 거래의 FLEX</title>
    <style>
        body, button, dd, div, dl, dt, fieldset, figcaption, figure, form, h1, h2, h3, h4, h5, h6, input, legend, li, ol, p, select, table, td, textarea, th, ul {
            margin: 0;
            padding: 0;
        }

        body{
            color: #222;
            font-family: Pretendard Variable,Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,Helvetica Neue,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,Malgun Gothic,Apple Color Emoji,Segoe UI Emoji,Segoe UI Symbol,sans-serif;
            font-feature-settings: "frac" 0, "numr" 0;
            /** 이 요소에서는 분수/분자 관련 특수 폰트 기능을 사용하지 마라” 라는 의미 */
        }

        main{
            display: block;
             /* 한글 ,영어, 아랍어 등 섞일떄 배치가 주변에 영향을 안주도록 고립시키는 css 속성 */            
            unicode-bidi: isolate;
        }

        div{
            display: block;
            unicode-bidi: isolate;
        }

        nav{
            display: block;
            unicode-bidi: isolate;
        }

        li, ol, ul{
            list-style: none;
        } 

        ul{
            margin-block-start: 1em;
            margin-block-end: 1em;
            padding-inline-start: 0;
            unicode-bidi: isolate;
        }

        li{
            display: inline-block;
            unicode-bidi: isolate;
        }

        a, a:active, a:focus, a:hover{
            text-decoration: none;
            color: #222;
        }


        button{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: initial;
            outline: none;
            padding: 0;
            border : 0;
        }
        
        /* 모바일 에서 손가락 터치하였을경우 하이라이트 색 제거 */
        /* a{
            -webkit-tap-highlight-color: transparent;
        } */


        .header-top{
            margin-left: auto;
            margin-right: auto;
            max-width: 1280px;
        }

        .top-inner{
            display: flex;
            height: 22px;
            padding: 8px 40px 0;
        }

        .top-list{
            align-items: center;
            display: flex;
            margin-left: auto;
        }

        .top-item{
            margin-left: 24px;
        }

        .top-link{
            display: flex;
            font-size: 12px;
            align-items: center;
            color: #222c;
            letter-spacing: -.06px;
        }

        .header-main{
            margin-left: auto;
            margin-right: auto;
            max-width: 1280px;
        }

        .main-inner{
            align-items: center;
            display: flex;
            height: 20px;
            justify-content: space-between;
            min-width: 320px;
            padding: 20px 40px;
        }
      
        .logo{
            display: flex;
            height: 24px;
            width: 120px;
        }

        .main-inner .right{
            display: flex;
            flex-shrink: 0;
            justify-content: flex-end;
            min-width: 120px;
        }

        .gnb-area{
            display: flex;
            align-items: center;
        }

        .gnb-list{
            align-items: center;
            display: flex;
        }

        .gnb-item{
            margin-right: 24px;
        }

        .gnb-link{
            font-size: 20px;
            letter-spacing: -.3px;
        }

        
        .search-button-margin{
            margin-right: 8px;
        }

        .header-cart-button{
            align-items: center;
            display: flex;
            flex-shrink: 0;
            height: 40px;
            justify-content: center;
            position: relative;
            width: 40px;
        }

        .btn-category{
            align-items: center;
            display: flex;
            flex-shrink: 0;
            height: 40px;
            justify-content: center;
            position: relative;
            width: 40px;
        }

        .header-container{
            border-bottom: 1px solid #ebebeb;
        }

        .header-base-tabs{
            margin-left: auto;
            margin-right: auto;
            max-width: 1280px;
        }

        .ul-tab{
            padding-left: 40px;
            padding-right: 40px;
            margin-block-end: 0;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .li-tab{
            display: inline-block;
        }

        .tab{
            display: flex;
            align-items: center;
            height: 48px;
            padding: 0 16px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .tab:hover{
            border-bottom-color: rgba(0, 0, 0, 0.1);
        }

        .tab_name{
            font-size: 14px;
            letter-spacing: -.21px;
            color: #222;
        }

        .header-search-button{
            cursor: pointer;
        }

        .center{
            flex: 1;
        }

        /* Hero Banner Section */
        .hero-banner{
            position: relative;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            max-width: 1120px;
            margin-top: 24px;
            margin-bottom: 24px;
            padding: 0 40px;
            overflow: hidden;
        }

        .hero-banner::before{
            content: '';
            display: block;
            padding-top: 40%; /* aspect-ratio: 2.5 (PC/Tablet) */
        }

        .banner-slide{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 16px;
            overflow: hidden;
        }

        .image_container{
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            border-radius: 16px;
            overflow: hidden;
        }

        .image_container .picture{
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 16px;
            overflow: hidden;
        }

        .image_container .picture img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 16px;
        }

        .banner-background{
            display: none;
        }

        .banner-overlay{
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 0 40px;
            z-index: 1;
            overflow: hidden;
        }

        .banner-title{
            font-size: 28px;
            font-weight: 700;
            color: #222;
            line-height: 1.4;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .banner-subtitle{
            font-size: 16px;
            color: #666;
            letter-spacing: -0.3px;
        }

        .banner-nav{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            background: transparent;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: opacity 0.2s;
            color: #4E4E4E;
        }

        .banner-nav svg{
            width: 56px;
            height: 56px;
            max-width: 100%;
            max-height: 100%;
        }

        .banner-nav:hover{
            opacity: 0.7;
        }

        .banner-nav.prev{
            left: 20px;
        }

        .banner-nav.next{
            right: 20px;
        }

        .banner-pagination{
            position: absolute;
            bottom: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-size: 13px;
            letter-spacing: -0.2px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .banner-highlight{
            display: none;
        }

        /* Category Grid Section */
        .category-section{
            margin-left: auto;
            margin-right: auto;
            max-width: 1120px;
            padding: 0 40px 60px;
        }

        .category-grid{
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 24px 16px;
        }

        .category-item{
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .category-item:hover{
            transform: translateY(-4px);
        }

        .category-image{
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 12px;
            background: #f5f5f5;
        }

        .category-label{
            font-size: 13px;
            color: #222;
            text-align: center;
            letter-spacing: -0.2px;
            line-height: 1.4;
        }

        .main-container{
            width: 100%;
        }

        /* Responsive Design */
        @media (max-width: 959px) {
            .category-grid{
                grid-template-columns: repeat(4, 1fr);
            }

            .hero-banner{
                max-width: 1120px;
                margin-top: 12px;
                margin-bottom: 12px;
                padding: 0 40px;
            }

            .hero-banner::before{
                padding-top: 40%; /* aspect-ratio: 2.5 (Tablet) */
            }

            .banner-overlay{
                padding: 0 40px;
            }

            .category-section{
                padding: 0 40px 60px;
            }

            .image_container{
                left: 0;
                right: 0;
                width: 100%;
            }

            .banner-title{
                font-size: 24px;
            }

            .banner-subtitle{
                font-size: 14px;
            }
        }

        @media (max-width: 767px) {
            .category-grid{
                grid-template-columns: repeat(4, 1fr);
                gap: 16px 12px;
            }

            .category-section{
                padding: 0 20px 40px;
            }

            .hero-banner{
                margin-top: 12px;
                margin-bottom: 12px;
                padding: 0 20px;
            }

            .hero-banner::before{
                padding-top: 90%; /* aspect-ratio: 1.111 (Mobile) */
            }

            .banner-overlay{
                padding: 0 20px;
            }

            .image_container{
                left: 0;
                right: 0;
                width: 100%;
            }

            .banner-title{
                font-size: 24px;
            }

            .banner-subtitle{
                font-size: 13px;
            }

            .banner-nav{
                width: 48px;
                height: 48px;
            }

            .banner-nav.prev{
                left: 20px;
            }

            .banner-nav.next{
                right: 20px;
            }

            .banner-pagination{
                bottom: 15px;
                right: 20px;
                font-size: 12px;
            }

            .banner-highlight{
                top: 15px;
                right: 20px;
                font-size: 11px;
            }

            .ul-tab{
                padding-left: 20px;
                padding-right: 20px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .tab{
                padding: 0 12px;
                white-space: nowrap;
            }
        }

        @media (max-width: 480px) {
            .category-grid{
                grid-template-columns: repeat(4, 1fr);
                gap: 12px 8px;
            }

            .category-label{
                font-size: 11px;
            }

            .hero-banner{
                padding: 0 20px;
            }

            .hero-banner::before{
                padding-top: 90%; /* aspect-ratio: 1.111 (Mobile) */
            }

            .banner-overlay{
                padding: 0 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .image_container{
                left: 0;
                right: 0;
                width: 100%;
            }

            .banner-title{
                font-size: 24px;
            }

            .banner-subtitle{
                font-size: 13px;
            }
        }

    </style>
</head>
