<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <title>KREAM | 한정판 거래의 FLEX</title>
    <style>
        body, button, dd, div, dl, dt, fieldset, figcaption, figure, form, h1, h2, h3, h4, h5, h6, input, legend, li, ol, p, select, table, td, textarea, th, ul {
            margin: 0;
            padding: 0;
        }

        body{
            color: #222;
            font-family: Pretendard Variable,Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,Helvetica Neue,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,Malgun Gothic,Apple Color Emoji,Segoe UI Emoji,Segoe UI Symbol,sans-serif;
            font-feature-settings: "frac" 0, "numr" 0;
            /** 이 요소에서는 분수/분자 관련 특수 폰트 기능을 사용하지 마라” 라는 의미 */
        }

        main{
            display: block;
             /* 한글 ,영어, 아랍어 등 섞일떄 배치가 주변에 영향을 안주도록 고립시키는 css 속성 */            
            unicode-bidi: isolate;
        }

        div{
            display: block;
            unicode-bidi: isolate;
        }

        nav{
            display: block;
            unicode-bidi: isolate;
        }

        li, ol, ul{
            list-style: none;
        } 

        ul{
            margin-block-start: 1em;
            margin-block-end: 1em;
            padding-inline-start: 400px;
            unicode-bidi: isolate;
        }

        li{
            display: inline-block;
            unicode-bidi: isolate;
        }

        a, a:active, a:focus, a:hover{
            text-decoration: none;
            color: #222;
        }


        button{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: initial;
            outline: none;
            padding: 0;
            border : 0;
        }
        
        /* 모바일 에서 손가락 터치하였을경우 하이라이트 색 제거 */
        /* a{
            -webkit-tap-highlight-color: transparent;
        } */


        .header-top{
            margin-left: auto;
            margin-right: auto;
            max-width: 1280px;
        }

        .top-inner{
            display: flex;
            height: 22px;
            padding: 8px 40px 0;
        }

        .top-list{
            align-items: center;
            display: flex;
            margin-left: auto;
        }

        .top-item{
            margin-left: 24px;
        }

        .top-link{
            display: flex;
            font-size: 12px;
            align-items: center;
            color: #222c;
            letter-spacing: -.06px;
        }

        .header-main{
            margin-left: auto;
            margin-right: auto;
            max-width: 1280px;
        }

        .main-inner{
            align-items: center;
            display: flex;
            height: 20px;
            justify-content: space-between;
            min-width: 320px;
            padding: 20px 40px;
        }
      
        .logo{
            display: flex;
            height: 24px;
            width: 120px;
        }

        .main-inner .right{
            display: flex;
            flex-shrink: 0;
            justify-content: flex-end;
            min-width: 120px;
        }

        .gnb-area{
            display: flex;
            align-items: center;
        }

        .gnb-list{
            align-items: center;
            display: flex;
        }

        .gnb-item{
            margin-right: 24px;
        }

        .gnb-link{
            font-size: 20px;
            letter-spacing: -.3px;
        }

        
        .search-button-margin{
            margin-right: 8px;
        }

        .header-cart-button{
            align-items: center;
            display: flex;
            flex-shrink: 0;
            height: 40px;
            justify-content: center;
            position: relative;
            width: 40px;
        }

        .btn-category{
            align-items: center;
            display: flex;
            flex-shrink: 0;
            height: 40px;
            justify-content: center;
            position: relative;
            width: 40px;
        }

        .header-base-tabs{
            margin-left: auto;
            margin-right: auto;
            max-width: 1280px;
        }

        .ul-tab{
            padding-left: 40px;
            padding-right: 40px;
        }


    </style>
</head>
